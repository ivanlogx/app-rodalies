<style>

  .tb { flex:1; padding:9px 14px; border:none; border-radius:9px; font-size:14px; font-weight:500; cursor:pointer; background:transparent; color:rgba(255,255,255,.5); font-family:inherit; transition:all .2s; }

  .search-btn:hover { background:rgba(255,255,255,.25); }
  .aw { position:relative; }
  .al { position:absolute; top:calc(100% + 4px); left:0; right:0; background:rgba(15,25,55,.97); backdrop-filter:blur(18px); border:1px solid rgba(255,255,255,.18); border-radius:13px; z-index:200; max-height:260px; overflow-y:auto; box-shadow:0 8px 28px rgba(0,0,0,.4); display:none; }

  .fr { display:flex; gap:8px; align-items:flex-end; }
  .fg { flex:1; min-width:0; }
  .fl { font-size:11px; color:rgba(255,255,255,.42); margin-bottom:4px; }
  .ri { width:100%; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18); border-radius:13px; padding:13px 16px; font-size:15px; color:#fff; font-family:inherit; outline:none; transition:all .2s; }

  .ri:focus { border-color:rgba(255,255,255,.5); background:rgba(255,255,255,.16); }
  .sw { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18); border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:17px; color:rgba(255,255,255,.65); transition:all .2s; flex-shrink:0; }
  .sw:hover { transform:rotate(180deg); background:rgba(255,255,255,.18); }
  .bp { background:rgba(215,43,43,.55); border:1px solid rgba(215,43,43,.75); border-radius:13px; padding:13px 22px; font-size:15px; font-weight:600; color:#fff; cursor:pointer; font-family:inherit; width:100%; margin-top:2px; transition:all .2s; }
  .bp:hover { background:rgba(215,43,43,.72); }
  .dp { display:flex; gap:8px; flex-wrap:wrap; }
  .dp-p { padding:7px 14px; border-radius:50px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.07); color:rgba(255,255,255,.55); transition:all .2s; user-select:none; }
  .dp-p.on { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.38); color:#fff; }
  .res { margin-top:4px; }
  .es { text-align:center; padding:36px 18px; color:rgba(255,255,255,.32); }
  .ei { font-size:36px; margin-bottom:10px; opacity:.45; }
  .et { font-size:14px; }
  .rc { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:15px; padding:14px; margin-bottom:9px; cursor:pointer; }
  .rc:hover { background:rgba(255,255,255,.11); }
  .sh { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .si { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.12); }
  .sn { font-size:16px; font-weight:600; }
  .sm { font-size:11px; color:rgba(255,255,255,.42); margin-top:2px; }

  .lb { display:inline-flex; align-items:center; padding:3px 9px; border-radius:50px; font-size:11px; font-weight:700; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.35); }

  .st-title { font-size:18px; font-weight:700; }
  .st-meta { font-size:12px; color:rgba(255,255,255,.42); margin-top:3px; }
  .divl { border:none; border-top:1px solid rgba(255,255,255,.08); margin:14px 0; }
  .dep-title { font-size:11px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color:rgba(255,255,255,.35); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:#4ade80; box-shadow:0 0 6px #4ade80; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .dep-row { display:grid; grid-template-columns:60px 1fr 60px 44px; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; margin-bottom:6px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.07); }
  .dep-row.imminent { background:rgba(100,200,100,.08); border-color:rgba(100,200,100,.2); }
  .dep-row.now      { background:rgba(255,210,50,.07);  border-color:rgba(255,210,50,.25); }
  .dep-time { font-size:17px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.5px; line-height:1.2; }
  .dep-time small { display:block; font-size:10px; font-weight:400; color:rgba(255,255,255,.35); text-decoration:line-through; }
  .dep-time.c-now      { color:#fde047; }
  .dep-time.c-imminent { color:#4ade80; }
  .dep-info { min-width:0; }
  .dep-dest { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dep-line-wrap { display:flex; align-items:center; gap:5px; margin-top:3px; flex-wrap:wrap; }
  .dep-delay { font-size:10px; padding:2px 6px; border-radius:4px; font-weight:600; }
  .dep-delay.late  { background:rgba(239,68,68,.2);  color:#fca5a5; border:1px solid rgba(239,68,68,.3); }
  .dep-delay.early { background:rgba(34,197,94,.15); color:#86efac; border:1px solid rgba(34,197,94,.25); }
  .dep-rt { font-size:10px; color:rgba(100,220,100,.7); }
  .dep-countdown { font-size:13px; font-weight:600; font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap; }
  .dep-countdown.c-now      { color:#fde047; }
  .dep-countdown.c-imminent { color:#4ade80; }
  .dep-countdown.c-soon     { color:rgba(255,255,255,.7); }
  .dep-via { font-size:10px; font-weight:600; color:rgba(255,255,255,.35); text-align:center; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:7px; padding:4px 6px; line-height:1.3; }
  .dep-via span { font-size:13px; font-weight:700; color:rgba(255,255,255,.7); display:block; }
  .loading { text-align:center; padding:28px; color:rgba(255,255,255,.4); font-size:14px; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,.15); border-top-color:rgba(255,255,255,.6); border-radius:50%; animation:spin .7s linear infinite; margin-right:8px; vertical-align:middle; }

  .tpw { display:flex; gap:8px; align-items:stretch; }
  .tiw { display:flex; align-items:center; gap:7px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.18); border-radius:11px; padding:11px 13px; flex:1; }
  .tiw:focus-within { border-color:rgba(255,255,255,.42); background:rgba(255,255,255,.14); }
  .tic { font-size:15px; opacity:.55; }
  .tin { background:transparent; border:none; outline:none; font-size:15px; font-weight:600; color:#fff; font-family:inherit; cursor:pointer; min-width:88px; }

  .nb { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.16); border-radius:9px; padding:11px 13px; font-size:13px; font-weight:500; color:rgba(255,255,255,.6); cursor:pointer; font-family:inherit; transition:all .2s; white-space:nowrap; }

  .jc { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:16px; margin-bottom:10px; }

  .jh { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .jtimes { display:flex; align-items:center; gap:10px; }
  .jtime { font-size:26px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-1px; }
  .jtime.hi { color:#64c8ff; }
  .jar { color:rgba(255,255,255,.32); font-size:16px; }
  .jdur { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.16); border-radius:50px; padding:3px 10px; font-size:12px; font-weight:500; }

  .jstops { position:relative; padding-left:18px; margin-top:10px; }

  .jstop { position:relative; padding:5px 0 5px 14px; font-size:13px; }
  .jstop::before { content:''; position:absolute; left:-13px; top:50%; transform:translateY(-50%); width:7px; height:7px; border-radius:50%; background:rgba(100,200,255,.75); border:2px solid rgba(100,200,255,.35); }

    .fr{flex-direction:column}.sw{align-self:center}.tpw{flex-direction:column}

  }
</style>

    <button class="tb on" id="tab-st" onclick="doTab('st')">🚉 Estacions</button>
    <button class="tb"    id="tab-rt" onclick="doTab('rt')">🗺️ Rutes</button>
  </div>

  <div id="pn-st" class="pn on">
    <div class="glass sg">
      <div class="sl">Cerca una estació</div>
      <div class="search-row">
        <div class="aw">
          <input class="gi" id="ss" placeholder="Escriu el nom de l'estació..."

          <div class="al" id="ss-ac"></div>

      </div>
    </div>
    <div id="st-res" class="res">

    </div>
  </div>

  <div id="pn-rt" class="pn">
    <div class="glass sg">

      <div class="rf">
        <div class="fr">
          <div class="fg">
            <div class="fl">Estació d'origen</div>
            <div class="aw">
              <input class="ri" id="ori" placeholder="D'on surts?" autocomplete="off" oninput="acRt('o',this.value)">
              <div class="al" id="o-ac"></div>
            </div>

          <button class="sw" onclick="doSwap()">⇅</button>

            <div class="fl">Estació de destí</div>

            </div>
          </div>
        </div>
        <div>
          <div class="fl">A partir de quina hora?</div>
          <div class="tpw">
            <div class="tiw"><span class="tic">🕐</span><input type="time" class="tin" id="deptime"></div>
            <button class="nb" onclick="setNow()">⚡ Ara</button>
          </div>
        </div>
        <button class="bp" onclick="doRoute()">Buscar propers trens →</button>
      </div>
    </div>
    <div id="rt-res" class="res">
      <div class="es"><div class="ei">🚂</div><div class="et">Selecciona origen i destí per buscar trens</div></div>
    </div>
  </div>
</div>

// NOTA: els stop_id anteriors son aproximacions fins que el servidor carregui el GTFS.
// El servidor fa servir els stop_id reals del GTFS. Si no troba resultats per un stop_id,
// l'endpoint /api/stop-id-lookup?name=NOM retorna el stop_id real per nom.

var APP = { ori: null, dst: null };
var TIMER_ID = null;
var currentStation = null;

function pad(n){ return String(n).padStart(2,'0'); }
function nowStr(){ var n=new Date(); return pad(n.getHours())+':'+pad(n.getMinutes()); }
function nowMin(){ var n=new Date(); return n.getHours()*60+n.getMinutes(); }
function s2m(s){ var p=s.split(':'); return parseInt(p[0],10)*60+parseInt(p[1],10); }
function m2s(m){ return pad(Math.floor(m/60)%24)+':'+pad(m%60); }
function addM(t,d){ return m2s(s2m(t)+d); }
function setNow(){ document.getElementById('deptime').value=nowStr(); }

function doTab(id){
  ['st','rt'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('on',t===id);
    document.getElementById('pn-'+t).classList.toggle('on',t===id);
  });
  if(id==='rt'&&TIMER_ID){ clearInterval(TIMER_ID); TIMER_ID=null; }
  if(id==='st'&&currentStation&&!TIMER_ID) TIMER_ID=setInterval(loadDepartures,20000);
}

// ── Buscador: búsqueda local sobre ST (siempre disponible) ───────────────────
function srchSt(val){
  var ac=document.getElementById('ss-ac');
  if(!val||val.length<2){ ac.style.display='none'; return; }
  var q=norm(val);
  var m=ST.filter(function(s){ return norm(s.name).indexOf(q)!==-1; }).slice(0,10);
  if(!m.length){ ac.style.display='none'; return; }
  ac.innerHTML=m.map(function(s){
    return '<div class="ai" onmousedown="pickSt(\''+esc(s.id)+'\',\''+esc(s.name)+'\')">'+s.name+'</div>';
  }).join('');
  ac.style.display='block';
}

function doSearch(){
  var val=document.getElementById('ss').value.trim();
  if(!val) return;
  document.getElementById('ss-ac').style.display='none';
  var q=norm(val);
  var m=ST.filter(function(s){ return norm(s.name).indexOf(q)!==-1; });
  if(m.length===1){ pickSt(m[0].id,m[0].name); }
  else if(m.length>1){ renderGrid(m); }
  else { document.getElementById('st-res').innerHTML='<div class="es"><div class="ei">🔍</div><div class="et">Cap estació trobada amb "'+val+'"</div></div>'; }
}

// Normalitza: treu accents i passa a minúscules per a la cerca
function norm(s){
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/ç/g,'c').replace(/·/g,'');
}
function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function pickSt(id, name){
  document.getElementById('ss').value=name;
  document.getElementById('ss-ac').style.display='none';
  currentStation={id:id, name:name};
  if(TIMER_ID) clearInterval(TIMER_ID);
  loadDepartures();
  TIMER_ID=setInterval(loadDepartures,20000);
}

function renderGrid(arr){
  document.getElementById('st-res').innerHTML=arr.slice(0,12).map(function(s){
    return '<div class="rc" onclick="pickSt(\''+esc(s.id)+'\',\''+esc(s.name)+'\')">'
      +'<div class="sh"><div class="si">🚉</div>'
      +'<div><div class="sn">'+s.name+'</div>'
      +'<div class="sm">'+s.lines.join(' · ')+'</div>'
      +'</div></div></div>';
  }).join('');
}

// ── Carga sortides del servidor ───────────────────────────────────────────────
function loadDepartures(){
  var st=currentStation; if(!st) return;
  var res=document.getElementById('st-res');
  res.innerHTML='<div class="st-detail">'
    +'<div class="st-detail-header"><div class="st-icon-big">🚉</div>'
    +'<div><div class="st-title">'+st.name+'</div>'
    +'<div class="st-meta" id="st-ts">Carregant...</div></div></div>'
    +'<hr class="divl">'
    +'<div class="loading"><span class="spinner"></span>Consultant horaris en temps real...</div>'
    +'</div>';

  // Primer intentem amb el stop_id local; si el servidor no troba res,
  // fem lookup per nom per obtenir el stop_id real del GTFS
  fetchDeps(st.id, function(data){
    if(data && data.departures && data.departures.length > 0){
      renderDeps(st, data);
    } else {
      // Fallback: buscar stop_id real per nom
      fetch(API+'/api/stop-id-lookup?name='+encodeURIComponent(st.name))
        .then(function(r){ return r.json(); })
        .then(function(d){
          if(d && d.stopId && d.stopId !== st.id){
            currentStation.id = d.stopId;
            fetchDeps(d.stopId, function(data2){
              renderDeps(st, data2 || {departures:[], updatedAt:new Date().toISOString()});
            });
          } else {
            renderDeps(st, data || {departures:[], updatedAt:new Date().toISOString()});
          }
        })
        .catch(function(){
          renderDeps(st, {departures:[], updatedAt:new Date().toISOString()});
        });
    }
  });
}

function fetchDeps(stopId, cb){
  fetch(API+'/api/departures?stopId='+encodeURIComponent(stopId))
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(d); })
    .catch(function(){ cb(null); });
}

function renderDeps(st, data){
  var res=document.getElementById('st-res');
  var nm=nowMin();
  var deps=data.departures||[];
  var ts=data.updatedAt?new Date(data.updatedAt).toLocaleTimeString('ca',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'—';

  var html='<div class="st-detail">'
    +'<div class="st-detail-header"><div class="st-icon-big">🚉</div>'
    +'<div><div class="st-title">'+st.name+'</div>'
    +'<div class="st-meta">Actualitzat '+ts
    +(data.warning?' · <span style="color:rgba(255,200,50,.8)">'+data.warning+'</span>':'')
    +(data.loading?' · <span style="color:rgba(255,200,50,.8)">GTFS carregant...</span>':'')
    +'</div></div></div><hr class="divl">'
    +'<div class="dep-title"><div class="live-dot"></div>Propers trens</div>';

  if(!deps.length){
    html+='<div class="es" style="padding:16px">'
      +'<div class="et">No hi ha trens programats en les pròximes 2 hores'
      +(data.loading?'<br><small style="opacity:.6">El servidor encara carrega el GTFS. Torna a intentar-ho en 30 segons.</small>':'')
      +'</div></div>';
  } else {
    deps.forEach(function(d){
      var realMin = s2m(d.departureReal);
      var diff    = realMin - nm;
      var rowCls  = diff<=0?'now':diff<=5?'imminent':'';
      var cdCls   = diff<=0?'c-now':diff<=5?'c-imminent':'c-soon';
      var cdLabel = diff<=0?'Ara':diff<60?(diff+' min'):(Math.floor(diff/60)+'h'+(diff%60>0?' '+diff%60+'m':''));

      var delayHtml='';
      if(d.delayMin>0)  delayHtml='<span class="dep-delay late">+'+d.delayMin+' min</span>';
      else if(d.delayMin<0) delayHtml='<span class="dep-delay early">'+d.delayMin+' min</span>';
      var rtHtml = d.hasRealtime ? '<span class="dep-rt">● temps real</span>' : '';

      var timeHtml = d.delayMin!==0
        ? '<span>'+d.departureReal+'</span><small>'+d.departure+'</small>'
        : d.departureReal;

      html+='<div class="dep-row '+rowCls+'">'
        +'<div class="dep-time c-'+rowCls+'">'+timeHtml+'</div>'
        +'<div class="dep-info">'
        +'<div class="dep-dest">'+(d.destination||'—')+'</div>'
        +'<div class="dep-line-wrap">'
        +(d.routeName?'<span class="lb" style="background:#555">'+d.routeName+'</span>':'')
        +delayHtml+rtHtml+'</div></div>'
        +'<div class="dep-countdown '+cdCls+'">'+cdLabel+'</div>'
        +'<div class="dep-via">VIA<span>'+(d.platform||'—')+'</span></div>'
        +'</div>';
    });
  }

  html+='<div style="font-size:11px;color:rgba(255,255,255,.2);margin-top:12px;text-align:center">'
    +'Renfe Open Data CC-BY 4.0 · s\'actualitza cada 20s</div></div>';

  res.innerHTML=html;
}

// ── Rutes ─────────────────────────────────────────────────────────────────────
function acRt(f,val){
  var ac=document.getElementById(f+'-ac');
  if(!val||val.length<2){ ac.style.display='none'; return; }
  var q=norm(val);
  var m=ST.filter(function(s){ return norm(s.name).indexOf(q)!==-1; }).slice(0,8);
  if(!m.length){ ac.style.display='none'; return; }
  ac.innerHTML=m.map(function(s){
    return '<div class="ai" onmousedown="pickRt(\''+f+'\',\''+esc(s.id)+'\',\''+esc(s.name)+'\')">'+s.name+'</div>';
  }).join('');
  ac.style.display='block';
}

function pickRt(f,id,name){
  if(f==='o'){ APP.ori={id:id,name:name}; document.getElementById('ori').value=name; }
  else       { APP.dst={id:id,name:name}; document.getElementById('dst').value=name; }
  document.getElementById(f+'-ac').style.display='none';
}

function doSwap(){
  var tmp=APP.ori; APP.ori=APP.dst; APP.dst=tmp;
  document.getElementById('ori').value=APP.ori?APP.ori.name:'';
  document.getElementById('dst').value=APP.dst?APP.dst.name:'';
}

function doRoute(){
  var res=document.getElementById('rt-res');
  if(!APP.ori||!APP.dst){ res.innerHTML='<div class="es"><div class="ei">⚠️</div><div class="et">Selecciona origen i destí</div></div>'; return; }
  if(APP.ori.id===APP.dst.id){ res.innerHTML='<div class="es"><div class="ei">🔄</div><div class="et">Origen i destí no poden ser iguals</div></div>'; return; }

  var timVal=document.getElementById('deptime').value;
  var fromMin=timVal?s2m(timVal):nowMin();

  res.innerHTML='<div class="glass rr"><div class="loading"><span class="spinner"></span>Buscant trens...</div></div>';

  fetch(API+'/api/departures?stopId='+encodeURIComponent(APP.ori.id))
    .then(function(r){ return r.json(); })
    .then(function(data){
      var deps=(data.departures||[]).filter(function(d){
        return d.departureReal && s2m(d.departureReal)>=fromMin;
      }).slice(0,4);

      var html='<div class="glass rr">'
        +'<div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap">'
        +'<span style="font-size:15px;font-weight:600">'+APP.ori.name+' → '+APP.dst.name+'</span>'
        +'<span class="fb">🕐 A partir de les '+m2s(fromMin)+'</span></div>';

      if(!deps.length){
        html+='<div class="es" style="padding:20px 0"><div class="et">No hi ha trens disponibles a partir d\'aquesta hora</div></div>';
      } else {
        deps.forEach(function(j,ji){
          var isFirst=ji===0;
          var depMin=s2m(j.departureReal);
          var diff=depMin-nowMin();
          var cdLabel=diff<=0?'Ara':diff<60?(diff+' min'):(Math.floor(diff/60)+'h '+(diff%60)+'m');
          html+='<div class="jc'+(isFirst?' first':'')+'">'
            +'<div class="jh"><div>'
            +'<div class="jtimes"><div class="jtime'+(isFirst?' hi':'')+'">'+j.departureReal+'</div>'
            +'<div class="jar">→</div><div class="jtime">'+APP.dst.name.split('-')[0].trim()+'...</div></div>'
            +'<div class="jlines">'
            +(j.routeName?'<span class="lb" style="background:#555">'+j.routeName+'</span>':'')
            +(j.delayMin>0?'<span class="dep-delay late" style="font-size:11px">+'+j.delayMin+' min</span>':'')
            +(j.hasRealtime?'<span style="font-size:10px;color:rgba(100,220,100,.7)">● RT</span>':'')
            +'</div></div>'
            +'<div style="text-align:right">'
            +(isFirst?'<div style="font-size:12px;color:rgba(100,200,255,.75)">'+cdLabel+'</div>':'')
            +'</div></div>'
            +'<div class="jstops">'
            +'<div class="jstop o">'+APP.ori.name+'<span class="stoptime">'+j.departureReal+'</span></div>'
            +'<div class="jstop d">'+APP.dst.name+'<span class="stoptime">—</span></div>'
            +'</div></div>';
        });
        html+='<div style="font-size:11px;color:rgba(255,255,255,.25);margin-top:8px">'
          +'Hora d\'arribada: consulta <a href="https://rodalies.gencat.cat" style="color:rgba(100,180,255,.4)" target="_blank">rodalies.gencat.cat</a></div>';
      }
      html+='</div>';
      res.innerHTML=html;
    })
    .catch(function(){
      res.innerHTML='<div class="glass rr"><div class="es"><div class="ei">⚠️</div><div class="et">Error connectant amb el servidor</div></div></div>';
    });
}

document.addEventListener('click',function(e){
  if(!e.target.closest('.aw')&&!e.target.closest('.search-btn'))
    document.querySelectorAll('.al').forEach(function(a){ a.style.display='none'; });
});

setNow();
